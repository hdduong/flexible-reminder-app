name: iOS TestFlight

on:
  workflow_dispatch:
    inputs:
      marketing_version:
        description: Optional iOS/App Store version, such as 1.0.0. Leave blank to use app/package.json.
        required: false
        type: string
      build_number:
        description: Optional iOS build number. Leave blank to use GitHub run number and run attempt.
        required: false
        type: string
  pull_request:
    paths:
      - 'app/**'
      - '.github/workflows/ios-testflight.yml'
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/ios-testflight.yml'

permissions:
  contents: read

# Manual signing and TestFlight upload require these repository secrets:
# APPLE_TEAM_ID
# IOS_DISTRIBUTION_CERTIFICATE_BASE64
# IOS_DISTRIBUTION_CERTIFICATE_PASSWORD
# IOS_PROVISIONING_PROFILE_BASE64
# APP_STORE_CONNECT_ISSUER_ID
# APP_STORE_CONNECT_KEY_ID
# APP_STORE_CONNECT_API_KEY
#
# If any are missing, this workflow still builds the Vite app, syncs/adds iOS,
# and performs an unsigned simulator build to validate the generated project.

env:
  IOS_BUNDLE_ID: com.hdduong.flexiblereminder
  IOS_SCHEME: App
  IOS_PROJECT: ../ios/App/App.xcodeproj
  IOS_WORKSPACE: ../ios/App/App.xcworkspace

jobs:
  ios:
    name: Build iOS
    runs-on: macos-26

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          XCODE_PATH="/Applications/Xcode_26.5.app"
          if [ ! -d "$XCODE_PATH" ]; then
            XCODE_PATH="$(python3 <<'PY'
          from pathlib import Path
          import re

          def version_key(path):
              match = re.search(r"Xcode_(\d+(?:\.\d+)*).*\.app$", path.name)
              if not match:
                  return ()
              return tuple(int(part) for part in match.group(1).split("."))

          paths = [path for path in Path("/Applications").glob("Xcode_26*.app") if path.is_dir()]
          if paths:
              print(max(paths, key=version_key))
          PY
          )"
          fi
          if [ ! -d "$XCODE_PATH" ]; then
            echo "::error::Xcode 26 is required for App Store Connect uploads."
            exit 1
          fi
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Validate app package
        working-directory: app
        run: |
          if [ ! -f package.json ]; then
            echo "::error file=app/package.json::app/package.json is required before the iOS workflow can install dependencies and build."
            exit 1
          fi

      - name: Install app dependencies
        working-directory: app
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Resolve iOS App Store version
        working-directory: app
        env:
          IOS_MARKETING_VERSION_INPUT: ${{ github.event.inputs.marketing_version }}
          IOS_BUILD_NUMBER_INPUT: ${{ github.event.inputs.build_number }}
        run: node scripts/resolve-ios-version.mjs

      - name: Build Vite app
        working-directory: app
        run: npm run build

      - name: Run unit tests
        working-directory: app
        run: npm test

      - name: Install Playwright browser
        working-directory: app
        run: npx playwright install chromium

      - name: Run Playwright tests
        working-directory: app
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: app/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: app/test-results
          if-no-files-found: ignore

      - name: Add or sync Capacitor iOS project
        working-directory: app
        run: |
          if [ -d ../ios/App ]; then
            npx cap sync ios
          else
            npx cap add ios
          fi

      - name: Check signing and TestFlight inputs
        id: signing
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          required=(
            APPLE_TEAM_ID
            IOS_DISTRIBUTION_CERTIFICATE_BASE64
            IOS_DISTRIBUTION_CERTIFICATE_PASSWORD
            IOS_PROVISIONING_PROFILE_BASE64
            APP_STORE_CONNECT_ISSUER_ID
            APP_STORE_CONNECT_KEY_ID
            APP_STORE_CONNECT_API_KEY
          )

          missing=()
          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -eq 0 ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "Signing and TestFlight upload are configured." >> "$GITHUB_STEP_SUMMARY"
            echo "Signed archive and TestFlight upload only run on manual dispatch from main." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Signing/TestFlight skipped. Missing secrets: ${missing[*]}" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Build unsigned iOS simulator app
        if: steps.signing.outputs.configured != 'true' || github.event_name != 'workflow_dispatch' || github.ref != 'refs/heads/main'
        working-directory: app
        run: |
          xcodebuild \
            -workspace "$IOS_WORKSPACE" \
            -scheme "$IOS_SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Import Apple signing assets
        if: steps.signing.outputs.configured == 'true' && github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
        id: signing_assets
        env:
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/distribution_certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/flexible_reminder.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          export CERTIFICATE_PATH PROFILE_PATH

          python3 <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["CERTIFICATE_PATH"]).write_bytes(
              base64.b64decode(os.environ["IOS_DISTRIBUTION_CERTIFICATE_BASE64"])
          )
          Path(os.environ["PROFILE_PATH"]).write_bytes(
              base64.b64decode(os.environ["IOS_PROVISIONING_PROFILE_BASE64"])
          )
          PY

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' "$PROFILE_PLIST")
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          echo "profile_uuid=$PROFILE_UUID" >> "$GITHUB_OUTPUT"

      - name: Configure App target manual signing
        if: steps.signing.outputs.configured == 'true' && github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
        working-directory: app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_BUILD_NUMBER: ${{ env.IOS_BUILD_NUMBER }}
          IOS_PROFILE_UUID: ${{ steps.signing_assets.outputs.profile_uuid }}
        run: |
          python3 <<'PY'
          import os
          import re
          from pathlib import Path

          project = Path("../ios/App/App.xcodeproj/project.pbxproj")
          text = project.read_text()

          list_match = re.search(
              r'([A-F0-9]+) /\* Build configuration list for PBXNativeTarget "App" \*/ = \{.*?buildConfigurations = \((.*?)\);',
              text,
              re.S,
          )
          if not list_match:
              raise SystemExit("Could not find App target build configuration list.")

          config_ids = re.findall(r'([A-F0-9]+) /\* (?:Debug|Release) \*/', list_match.group(2))
          if not config_ids:
              raise SystemExit("Could not find App target build configurations.")

          def quote(value):
              return '"' + value.replace("\\", "\\\\").replace('"', '\\"') + '"'

          settings = {
              "CODE_SIGN_STYLE": "Manual",
              "CODE_SIGN_IDENTITY": quote("Apple Distribution"),
              '"CODE_SIGN_IDENTITY[sdk=iphoneos*]"': quote("Apple Distribution"),
              "CURRENT_PROJECT_VERSION": os.environ["IOS_BUILD_NUMBER"],
              "DEVELOPMENT_TEAM": os.environ["APPLE_TEAM_ID"],
              "MARKETING_VERSION": os.environ["IOS_MARKETING_VERSION"],
              "PROVISIONING_PROFILE": quote(os.environ["IOS_PROFILE_UUID"]),
              "PROVISIONING_PROFILE_SPECIFIER": quote(os.environ["IOS_PROFILE_UUID"]),
          }

          def set_setting(block, key, value):
              pattern = rf'(\n\s*){re.escape(key)} = .*?;'
              replacement = rf'\1{key} = {value};'
              if re.search(pattern, block):
                  return re.sub(pattern, replacement, block)
              return block.replace("buildSettings = {", f"buildSettings = {{\n\t\t\t\t{key} = {value};", 1)

          for config_id in config_ids:
              block_pattern = re.compile(
                  rf'({config_id} /\* (?:Debug|Release) \*/ = \{{.*?\n\t\t\}};)',
                  re.S,
              )
              block_match = block_pattern.search(text)
              if not block_match:
                  raise SystemExit(f"Could not find build configuration {config_id}.")
              block = block_match.group(1)
              updated = block
              for key, value in settings.items():
                  updated = set_setting(updated, key, value)
              text = text[:block_match.start(1)] + updated + text[block_match.end(1):]

          project.write_text(text)
          PY

      - name: Create export options
        if: steps.signing.outputs.configured == 'true' && github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
        working-directory: app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_PROFILE_UUID: ${{ steps.signing_assets.outputs.profile_uuid }}
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${IOS_BUNDLE_ID}</key>
              <string>${IOS_PROFILE_UUID}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Resolve iOS package dependencies
        if: steps.signing.outputs.configured == 'true' && github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
        working-directory: app
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$IOS_PROJECT" \
            -scheme "$IOS_SCHEME"

      - name: Archive signed iOS app
        if: steps.signing.outputs.configured == 'true' && github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
        working-directory: app
        run: |
          xcodebuild archive \
            -workspace "$IOS_WORKSPACE" \
            -scheme "$IOS_SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/FlexibleReminder.xcarchive"

      - name: Export IPA
        if: steps.signing.outputs.configured == 'true' && github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/FlexibleReminder.xcarchive" \
            -exportPath "$RUNNER_TEMP/testflight" \
            -exportOptionsPlist app/ExportOptions.plist

      - name: Normalize IPA name
        if: steps.signing.outputs.configured == 'true' && github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
        id: ipa
        run: |
          IPA_PATH="$(find "$RUNNER_TEMP/testflight" -name '*.ipa' -print -quit)"
          if [ -z "$IPA_PATH" ]; then
            echo "::error::No IPA was exported for TestFlight upload."
            exit 1
          fi
          mv "$IPA_PATH" "$RUNNER_TEMP/testflight/FlexibleReminder.ipa"
          echo "path=$RUNNER_TEMP/testflight/FlexibleReminder.ipa" >> "$GITHUB_OUTPUT"

      - name: Upload IPA artifact
        if: steps.signing.outputs.configured == 'true' && github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: flexible-reminder-ipa
          path: ${{ runner.temp }}/testflight/FlexibleReminder.ipa
          if-no-files-found: error

      - name: Upload to TestFlight
        if: steps.signing.outputs.configured == 'true' && github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ${{ steps.ipa.outputs.path }}
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_KEY }}

      - name: Upload generated iOS project
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: capacitor-ios-project
          path: ios
          if-no-files-found: ignore
