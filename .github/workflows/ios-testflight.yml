name: iOS TestFlight

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'app/**'
      - '.github/workflows/ios-testflight.yml'
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/ios-testflight.yml'

permissions:
  contents: read

# Automatic signing and TestFlight upload require these repository secrets:
# APPLE_TEAM_ID
# APP_STORE_CONNECT_ISSUER_ID
# APP_STORE_CONNECT_KEY_ID
# APP_STORE_CONNECT_API_KEY
#
# If any are missing, this workflow still builds the Vite app, syncs/adds iOS,
# and performs an unsigned simulator build to validate the generated project.

env:
  IOS_BUNDLE_ID: com.hdduong.flexiblereminder
  IOS_SCHEME: App
  IOS_WORKSPACE: ../ios/App/App.xcworkspace

jobs:
  ios:
    name: Build iOS
    runs-on: macos-26

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          XCODE_PATH="/Applications/Xcode_26.5.app"
          if [ ! -d "$XCODE_PATH" ]; then
            XCODE_PATH="$(python3 <<'PY'
          from pathlib import Path
          import re

          def version_key(path):
              match = re.search(r"Xcode_(\d+(?:\.\d+)*).*\.app$", path.name)
              if not match:
                  return ()
              return tuple(int(part) for part in match.group(1).split("."))

          paths = [path for path in Path("/Applications").glob("Xcode_26*.app") if path.is_dir()]
          if paths:
              print(max(paths, key=version_key))
          PY
          )"
          fi
          if [ ! -d "$XCODE_PATH" ]; then
            echo "::error::Xcode 26 is required for App Store Connect uploads."
            exit 1
          fi
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Validate app package
        working-directory: app
        run: |
          if [ ! -f package.json ]; then
            echo "::error file=app/package.json::app/package.json is required before the iOS workflow can install dependencies and build."
            exit 1
          fi

      - name: Install app dependencies
        working-directory: app
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build Vite app
        working-directory: app
        run: npm run build

      - name: Run unit tests
        working-directory: app
        run: npm test

      - name: Install Playwright browser
        working-directory: app
        run: npx playwright install chromium

      - name: Run Playwright tests
        working-directory: app
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: app/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: app/test-results
          if-no-files-found: ignore

      - name: Add or sync Capacitor iOS project
        working-directory: app
        run: |
          if [ -d ../ios/App ]; then
            npx cap sync ios
          else
            npx cap add ios
          fi

      - name: Check signing and TestFlight inputs
        id: signing
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          required=(
            APPLE_TEAM_ID
            APP_STORE_CONNECT_ISSUER_ID
            APP_STORE_CONNECT_KEY_ID
            APP_STORE_CONNECT_API_KEY
          )

          missing=()
          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -eq 0 ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "Signing and TestFlight upload are configured." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Signing/TestFlight skipped. Missing secrets: ${missing[*]}" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Build unsigned iOS simulator app
        if: steps.signing.outputs.configured != 'true' || github.event_name == 'pull_request'
        working-directory: app
        run: |
          xcodebuild \
            -workspace "$IOS_WORKSPACE" \
            -scheme "$IOS_SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Write App Store Connect API key
        if: steps.signing.outputs.configured == 'true' && github.event_name != 'pull_request'
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP/appstoreconnect"
          API_KEY_PATH="$RUNNER_TEMP/appstoreconnect/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          printf '%s' "$APP_STORE_CONNECT_API_KEY" > "$API_KEY_PATH"
          chmod 600 "$API_KEY_PATH"

      - name: Archive signed iOS app
        if: steps.signing.outputs.configured == 'true' && github.event_name != 'pull_request'
        working-directory: app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          xcodebuild \
            -workspace "$IOS_WORKSPACE" \
            -scheme "$IOS_SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/FlexibleReminder.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/appstoreconnect/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$IOS_BUNDLE_ID" \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            archive

      - name: Export IPA
        if: steps.signing.outputs.configured == 'true' && github.event_name != 'pull_request'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          EXPORT_OPTIONS="$RUNNER_TEMP/ExportOptions.plist"
          cat > "$EXPORT_OPTIONS" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/FlexibleReminder.xcarchive" \
            -exportPath "$RUNNER_TEMP/testflight" \
            -exportOptionsPlist "$EXPORT_OPTIONS" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/appstoreconnect/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Locate exported IPA
        if: steps.signing.outputs.configured == 'true' && github.event_name != 'pull_request'
        id: ipa
        run: |
          IPA_PATH="$(find "$RUNNER_TEMP/testflight" -name '*.ipa' -print -quit)"
          if [ -z "$IPA_PATH" ]; then
            echo "::error::No IPA was exported for TestFlight upload."
            exit 1
          fi
          echo "path=$IPA_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload IPA artifact
        if: steps.signing.outputs.configured == 'true' && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: flexible-reminder-ipa
          path: ${{ runner.temp }}/testflight/*.ipa
          if-no-files-found: error

      - name: Upload to TestFlight
        if: steps.signing.outputs.configured == 'true' && github.event_name != 'pull_request'
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ${{ steps.ipa.outputs.path }}
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_KEY }}

      - name: Upload generated iOS project
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: capacitor-ios-project
          path: ios
          if-no-files-found: ignore
