name: iOS TestFlight

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'app/**'
      - '.github/workflows/ios-testflight.yml'
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/ios-testflight.yml'

permissions:
  contents: read

# Signed TestFlight upload requires these repository secrets:
# APPLE_TEAM_ID
# IOS_DISTRIBUTION_CERTIFICATE_BASE64
# IOS_DISTRIBUTION_CERTIFICATE_PASSWORD
# IOS_PROVISIONING_PROFILE_BASE64
# IOS_PROVISIONING_PROFILE_SPECIFIER
# APP_STORE_CONNECT_API_KEY_ID
# APP_STORE_CONNECT_API_ISSUER_ID
# APP_STORE_CONNECT_API_PRIVATE_KEY
#
# If any are missing, this workflow still builds the Vite app, syncs/adds iOS,
# and performs an unsigned simulator build to validate the generated project.

jobs:
  ios:
    name: Build iOS
    runs-on: macos-14

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Validate app package
        working-directory: app
        run: |
          if [ ! -f package.json ]; then
            echo "::error file=app/package.json::app/package.json is required before the iOS workflow can install dependencies and build."
            exit 1
          fi

      - name: Install app dependencies
        working-directory: app
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build Vite app
        working-directory: app
        run: npm run build

      - name: Add or sync Capacitor iOS project
        working-directory: app
        run: |
          if [ -d ../ios/App ]; then
            npx cap sync ios
          else
            npx cap add ios
          fi

      - name: Check signing and TestFlight inputs
        id: signing
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_PROVISIONING_PROFILE_SPECIFIER: ${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          required=(
            APPLE_TEAM_ID
            IOS_DISTRIBUTION_CERTIFICATE_BASE64
            IOS_DISTRIBUTION_CERTIFICATE_PASSWORD
            IOS_PROVISIONING_PROFILE_BASE64
            IOS_PROVISIONING_PROFILE_SPECIFIER
            APP_STORE_CONNECT_API_KEY_ID
            APP_STORE_CONNECT_API_ISSUER_ID
            APP_STORE_CONNECT_API_PRIVATE_KEY
          )

          missing=()
          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -eq 0 ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "Signing and TestFlight upload are configured." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Signing/TestFlight skipped. Missing secrets: ${missing[*]}" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Build unsigned iOS simulator app
        if: steps.signing.outputs.configured != 'true' || github.event_name == 'pull_request'
        working-directory: app
        run: |
          xcodebuild \
            -workspace ../ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Import Apple signing assets
        if: steps.signing.outputs.configured == 'true' && github.event_name != 'pull_request'
        env:
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/distribution_certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/flexible_reminder.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

          echo "$IOS_DISTRIBUTION_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' "$PROFILE_PLIST")
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

      - name: Archive signed iOS app
        if: steps.signing.outputs.configured == 'true' && github.event_name != 'pull_request'
        working-directory: app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_PROVISIONING_PROFILE_SPECIFIER: ${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}
        run: |
          xcodebuild \
            -workspace ../ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/FlexibleReminder.xcarchive" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER=com.hdduong.flexiblereminder \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$IOS_PROVISIONING_PROFILE_SPECIFIER" \
            archive

      - name: Export IPA
        if: steps.signing.outputs.configured == 'true' && github.event_name != 'pull_request'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_PROVISIONING_PROFILE_SPECIFIER: ${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}
        run: |
          EXPORT_OPTIONS="$RUNNER_TEMP/ExportOptions.plist"
          cat > "$EXPORT_OPTIONS" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.hdduong.flexiblereminder</key>
              <string>$IOS_PROVISIONING_PROFILE_SPECIFIER</string>
            </dict>
          </dict>
          </plist>
          PLIST

          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/FlexibleReminder.xcarchive" \
            -exportPath "$RUNNER_TEMP/testflight" \
            -exportOptionsPlist "$EXPORT_OPTIONS"

      - name: Upload IPA artifact
        if: steps.signing.outputs.configured == 'true' && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: flexible-reminder-ipa
          path: ${{ runner.temp }}/testflight/*.ipa
          if-no-files-found: error

      - name: Upload to TestFlight
        if: steps.signing.outputs.configured == 'true' && github.event_name != 'pull_request'
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          API_KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          printf '%s' "$APP_STORE_CONNECT_API_PRIVATE_KEY" > "$API_KEY_PATH"
          chmod 600 "$API_KEY_PATH"

          IPA_PATH="$(find "$RUNNER_TEMP/testflight" -name '*.ipa' -print -quit)"
          if [ -z "$IPA_PATH" ]; then
            echo "::error::No IPA was exported for TestFlight upload."
            exit 1
          fi

          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID"

      - name: Upload generated iOS project
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: capacitor-ios-project
          path: ios
          if-no-files-found: ignore
